<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
      body {
        margin: 0;
        padding: 0;
        background: #111;
        color: #fff;
        font-family: "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      h2 {
        margin-top: 20px;
        font-size: 24px;
        font-weight: 600;
      }

      .card {
        background: #1c1c1c;
        padding: 20px;
        margin-top: 20px;
        border-radius: 12px;
        width: 90%;
        max-width: 360px;
        box-shadow: 0 0 20px rgba(0,0,0,0.4);
      }

      #reader {
        width: 100%;
        border-radius: 10px;
        overflow: hidden;
      }

      #result {
        margin-top: 15px;
        font-size: 18px;
        font-weight: 500;
        color: #4ade80; /* 緑 */
      }

      .warning {
        color: #f87171; /* 赤 */
      }
    </style>
  </head>

  <body>
    <h2>QR 出席管理ver1.4</h2>

    <div class="card">
      <div id="reader"></div>
      <p id="result">QR を読み取ってください</p>
    </div>

    <script>
      const GAS_URL = "https://script.google.com/macros/s/AKfycbzWFyp116k75tWiy9qpj29cqBZlVh0xTaSm8jqfMkz75kL3lqcmeeEt5FiVB8RgVvyWbA/exec";

      let lastScanned = "";
      let lastTime = 0;
      const blockMs = 3000;

      function onScanSuccess(decodedText) {
        const now = Date.now();

        // 二重読み取り防止
        if (decodedText === lastScanned && now - lastTime < blockMs) {
          document.getElementById("result").innerHTML =
            `<span class="warning">同じQRを連続で読み取りました（無視）</span>`;
          return;
        }

        lastScanned = decodedText;
        lastTime = now;

        document.getElementById("result").innerText = "読み取り: " + decodedText;

        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ qr: decodedText })
        });
      }

      const html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
      );
    </script>
  </body>
</html>
