<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/html5-qrcode"></script>
  </head>
  <body>
    <h2>QR 出席管理ver1.0</h2>

    <div id="reader" style="width: 300px;"></div>
    <p id="result"></p>

    <script>
      const GAS_URL = "https://script.google.com/macros/s/AKfycbzWFyp116k75tWiy9qpj29cqBZlVh0xTaSm8jqfMkz75kL3lqcmeeEt5FiVB8RgVvyWbA/exec"; // ← ここに /exec を貼る

      function onScanSuccess(decodedText) {
        document.getElementById("result").innerText = "読み取り: " + decodedText;

        // GAS に送信
        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ qr: decodedText })
        });
      }

      const html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
      );
    </script>
  </body>
</html>
